<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <style>
    @keyframes bd{0%{opacity:0;transform:translateY(-4px)}11%{opacity:1;transform:translateY(0)}}
    @keyframes be{0%,7%{opacity:0;transform:translateY(-4px)}18%{opacity:1;transform:translateY(0)}}
    @keyframes bv{0%,14%{opacity:0;transform:translateY(-4px)}25%{opacity:1;transform:translateY(0)}}
    @keyframes gp{0%,54%{transform:scale(1);fill:#4F46E5}58%{transform:scale(1.05) translate(1px,-1px);fill:#22D3EE}62%{transform:scale(.95) translate(-1px,1px);fill:#4F46E5}66%{transform:scale(1.06)}70%{transform:scale(1.15)}74%,to{transform:scale(1)}}
    .d{animation:bd 4s infinite}
    .e{animation:be 4s infinite}
    .v{animation:bv 4s infinite}
    .g{transform-origin:16px 10px;animation:gp 4s infinite}
  </style>
  <g class="g">
    <g class="d" fill="#4F46E5">
      <rect x="1" y="2" width="2" height="2"/>
      <rect x="4" y="2" width="2" height="2"/>
      <rect x="7" y="2" width="2" height="2"/>
      <rect x="1" y="5" width="2" height="2"/>
      <rect x="7" y="5" width="2" height="2"/>
      <rect x="1" y="8" width="2" height="2"/>
      <rect x="7" y="8" width="2" height="2"/>
      <rect x="1" y="11" width="2" height="2"/>
      <rect x="7" y="11" width="2" height="2"/>
      <rect x="1" y="14" width="2" height="2"/>
      <rect x="7" y="14" width="2" height="2"/>
      <rect x="1" y="17" width="2" height="2"/>
      <rect x="4" y="17" width="2" height="2"/>
      <rect x="7" y="17" width="2" height="2"/>
    </g>
    <g class="e" fill="#4F46E5">
      <rect x="10" y="2" width="2" height="2"/>
      <rect x="13" y="2" width="2" height="2"/>
      <rect x="16" y="2" width="2" height="2"/>
      <rect x="10" y="5" width="2" height="2"/>
      <rect x="10" y="8" width="2" height="2"/>
      <rect x="13" y="8" width="2" height="2"/>
      <rect x="10" y="11" width="2" height="2"/>
      <rect x="10" y="14" width="2" height="2"/>
      <rect x="10" y="17" width="2" height="2"/>
      <rect x="13" y="17" width="2" height="2"/>
      <rect x="16" y="17" width="2" height="2"/>
    </g>
    <g class="v" fill="#4F46E5">
      <rect x="19" y="2" width="2" height="2"/>
      <rect x="25" y="2" width="2" height="2"/>
      <rect x="19" y="5" width="2" height="2"/>
      <rect x="25" y="5" width="2" height="2"/>
      <rect x="22" y="8" width="2" height="2"/>
      <rect x="22" y="11" width="2" height="2"/>
      <rect x="22" y="14" width="2" height="2"/>
      <rect x="22" y="17" width="2" height="2"/>
    </g>
  </g>
</svg>
